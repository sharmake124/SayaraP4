# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "dev" ]  # Déclenchement sur les push vers la branche 'dev'
  pull_request:
    branches: [ "dev" ]  # Déclenchement lors de la création ou mise à jour d'une PR vers la branche 'dev'

jobs:
  build:
    runs-on: ubuntu-latest  # Utilisation de l'environnement Ubuntu pour les builds
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]  # Test avec plusieurs versions de Node.js

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Cloner le code source depuis GitHub

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'  # Cache des dépendances npm pour améliorer les performances

    # Installer les dépendances globales à la racine
    - name: Install root dependencies
      run: npm ci  # Installe les dépendances à la racine (package.json principal)

    # Installer les dépendances frontend dans le répertoire 'Frontend'
    - name: Install frontend dependencies
      run: npm ci --prefix Frontend  # Installe les dépendances spécifiées dans frontend/package.json

    # Lint et tests frontend
    - name: Run ESLint on frontend
      run: npm run lint --prefix Frontend  # Utilise le répertoire 'Frontend'

    - name: Run build frontend
      run: npm run build:frontend --prefix Frontend  # Utilise le répertoire 'Frontend'

    - name: Run tests frontend
      run: npm test --prefix Frontend  # Utilise le répertoire 'Frontend'

    # Installer les dépendances backend dans le répertoire 'Backend'
    - name: Install backend dependencies
      run: npm ci --prefix Backend  # Installe les dépendances spécifiées dans backend/package.json

    # Lint et tests backend
    - name: Run ESLint on backend
      run: npm run lint --prefix Backend  # Utilise le répertoire 'Backend'

    - name: Run build backend
      run: npm run build:backend --prefix Backend  # Utilise le répertoire 'Backend'

    - name: Run tests backend
      run: npm test --prefix Backend  # Utilise le répertoire 'Backend'



   

 
